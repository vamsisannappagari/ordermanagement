_schema-version: 3.3.0
ID: approuter
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production --ws-pack
modules:
  - name: approuter-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: approuter-destination

  - name: approuter-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
    requires:
      - name: srv-api
      - name: approuter-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    parameters:
      config:
        destinations:
          - Name: srv-api
            URL: ~{srv-api/srv-url}
            Authentication: NoAuthentication
            Type: HTTP
            ProxyType: Internet
            HTML5.ForwardAuthToken: true
            HTML5.DynamicDestination: true

  - name: approuter-destinations
    type: com.sap.application.content
    requires:
      - name: approuter-html5-repo-host
        parameters:
          service-key:
            name: approuter-html5-repo-host-key
      - name: srv-api
      - name: approuter-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: approuter-html5-repository
              ServiceInstanceName: approuter-html5-repo-host
              ServiceKeyName: approuter-html5-repo-host-key
              sap.cloud.service: approuter.service

resources:
  - name: approuter-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
    requires:
      - name: srv-api

  - name: approuter-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
