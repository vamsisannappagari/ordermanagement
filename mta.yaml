_schema-version: 3.3.0
ID: ordermanagement
description: A simple CAP project.
version: 1.0.0
modules:
  - name: ordermanagement-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: ordermanagement-auth
      - name: ordermanagement-db
      - name: ordermanagement-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: ordermanagement-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: ordermanagement-db
    parameters:
      buildpack: nodejs_buildpack
  - name: ordermanagement
    type: approuter.nodejs
    path: app/router
    requires:
      - name: srv-api
        group: destinations
        properties:
          forwardAuthToken: true
          name: srv-api
          url: ~{srv-url}
      - name: ordermanagement-auth
      - name: ordermanagement-html5-runtime
      - name: ordermanagement-destination
        group: destinations
        properties:
          forwardAuthToken: false
          name: ui5
          url: https://ui5.sap.com
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}
    parameters:
      disk-quota: 256M
      keep-existing-routes: true
      memory: 256M
  - name: ordermanagement-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: ordermanagement-auth
      - name: srv-api
      - name: ordermanagement-html5-repo-host
        parameters:
          config:
            HTML5Runtime_enabled: true
          content-target: true
    parameters:
      config:
        destinations:
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
    build-parameters:
      build-result: app/
      requires:
        - artifacts:
            - dashboard.zip
          name: ordermanagementdashboard
          target-path: app/
        - artifacts:
            - requester.zip
          name: ordermanagementrequester
          target-path: app/
        - artifacts:
            - approval.zip
          name: approval
          target-path: app/
        - artifacts:
            - receipts.zip
          name: receipts
          target-path: app/
  - name: ordermanagementdashboard
    type: html5
    path: app/dashboard
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: ordermanagementrequester
    type: html5
    path: app/requester
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: ordermanagement-destinations
    type: com.sap.application.content
    requires:
      - name: ordermanagement-auth
        parameters:
          service-key:
            name: ordermanagement-auth-key
      - name: ordermanagement-html5-repo-host
        parameters:
          service-key:
            name: ordermanagement-html5-repo-host-key
      - name: srv-api
      - name: ordermanagement-destination
        parameters:
          content-target: true
    parameters:
      content:
        instance:
          destinations:
            - Name: ordermanagement-html5-repository
              ServiceInstanceName: ordermanagement-html5-repo-host
              ServiceKeyName: ordermanagement-html5-repo-host-key
              sap.cloud.service: ordermanagement.service
            - Authentication: OAuth2UserTokenExchange
              Name: ordermanagement-auth
              ServiceInstanceName: ordermanagement-auth
              ServiceKeyName: ordermanagement-auth-key
              sap.cloud.service: ordermanagement.service
          existing_destinations_policy: update
    build-parameters:
      no-source: true
  - name: approval
    type: html5
    path: app/approval
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: receipts
    type: html5
    path: app/receipts
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
        - npm ci
        - npm run build
      supported-platforms:
        []
resources:
  - name: ordermanagement-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - description: generated
            name: Buyer (ordermanagement ${org}-${space})
            role-template-references:
              - $XSAPPNAME.Buyer
          - description: generated
            name: Requester (ordermanagement ${org}-${space})
            role-template-references:
              - $XSAPPNAME.Requester
          - description: generated
            name: Approver (ordermanagement ${org}-${space})
            role-template-references:
              - $XSAPPNAME.Approver
          - description: generated
            name: Administrator (ordermanagement ${org}-${space})
            role-template-references:
              - $XSAPPNAME.Administrator
        tenant-mode: dedicated
        xsappname: ordermanagement-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
    requires:
      - name: app-api
  - name: ordermanagement-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: ordermanagement-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
      service: destination
      service-plan: lite
    requires:
      - name: srv-api
  - name: ordermanagement-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: ordermanagement-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
